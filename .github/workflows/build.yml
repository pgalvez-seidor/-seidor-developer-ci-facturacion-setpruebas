name: Build AutoBotIA

on:
  push:
    branches: [CI]
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Build React UI
        run: npm run build --prefix ui
      - name: Build DMG
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --mac
      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: AutoBotIA-mac
          path: dist/*.dmg

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Build React UI
        run: npm run build --prefix ui
      - name: Build EXE
        run: npx electron-builder --win
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: AutoBotIA-win
          path: dist/*.exe
